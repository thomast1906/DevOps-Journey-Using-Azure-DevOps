name: $(BuildDefinitionName)_$(date:yyyyMMdd)$(rev:.r)

trigger:
  batch: true 
  branches:
    include:
      - main

# Don't run against PRs
pr: none

variables:
  # NOTE: The service connection referenced by backendServiceArm must be configured as
  # "Workload Identity Federation" (OIDC) in Azure DevOps > Project Settings > Service Connections.
  # This eliminates the need for client secrets and enables automatic token rotation.
  # TerraformTaskV4@4, Docker@2, and AzureCLI@2 all natively support WIF service connections.
  - name: backendServiceArm
    value: 'azure-devops-journey-apr2026'
  - name: backendAzureRmResourceGroupName
    value: 'devops-journey-rg-apr2026'
  - name: backendAzureRmStorageAccountName
    value: 'devopsjourneyapr2026'
  - name: backendAzureRmContainerName
    value: 'tfstate'
  - name: backendAzureRmKey
    value: 'terraform.tfstate'
  - name: environment
    value: 'production'
  - name: terraform_version
    value: '1.14.9'
  - name: repository
    value: 'repository'
  - name: dockerfile
    value: '$(Build.SourcesDirectory)/app/Dockerfile'
  - name: containerRegistry
    value: 'devopsjourneyapr2026acr'
  - group: devopsjourney

stages :          
  - stage: plan
    jobs:
      - job: terraform_plan_production
        steps:
        - task: TerraformInstaller@1
          displayName: 'install'
          inputs:
            terraformVersion: ${{ variables.terraform_version}}
        - task: TerraformTaskV4@4
          displayName: 'init'
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: ${{ variables.backendServiceArm }}
            backendAzureRmResourceGroupName: ${{ variables.backendAzureRmResourceGroupName }}
            backendAzureRmStorageAccountName: ${{ variables.backendAzureRmStorageAccountName }}
            backendAzureRmContainerName: ${{ variables.backendAzureRmContainerName }}
            backendAzureRmKey: ${{ variables.backendAzureRmKey }}
            workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/'
        - task: TerraformTaskV4@4
          displayName: 'validate'
          inputs:
            provider: 'azurerm'
            command: 'validate'
            environmentServiceNameAzureRM: ${{ variables.backendServiceArm }}
            workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/'
        - task: TerraformTaskV4@4
          displayName: 'plan'
          inputs:
            provider: 'azurerm'
            command: 'plan'
            commandOptions: '-input=false -var-file="../vars/${{ variables.environment }}.tfvars"'
            environmentServiceNameAzureRM: ${{ variables.backendServiceArm }}
            workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/'

  - stage: apply
    dependsOn: [plan]
    condition: succeeded('plan')
    jobs:
      - job: terraform_apply_production
        steps:
        - task: TerraformInstaller@1
          displayName: 'install'
          inputs:
            terraformVersion: ${{ variables.terraform_version}}
        - task: TerraformTaskV4@4
          displayName: 'init'
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: ${{ variables.backendServiceArm }}
            backendAzureRmResourceGroupName: ${{ variables.backendAzureRmResourceGroupName }}
            backendAzureRmStorageAccountName: ${{ variables.backendAzureRmStorageAccountName }}
            backendAzureRmContainerName: ${{ variables.backendAzureRmContainerName }}
            backendAzureRmKey: ${{ variables.backendAzureRmKey }} 
            workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/'
        - task: TerraformTaskV4@4
          displayName: 'apply'
          inputs:
            provider: 'azurerm'
            command: 'apply'
            commandOptions: '-input=false -auto-approve -var-file="../vars/${{ variables.environment }}.tfvars"'
            environmentServiceNameAzureRM: ${{ variables.backendServiceArm }}
            workingDirectory: '$(System.DefaultWorkingDirectory)/terraform/'

  - stage: Build
    dependsOn: [apply]
    displayName: Build and push image
    jobs:  
    - job: Build
      displayName: Build job
      steps:
      - task: Docker@2
        displayName: Build and push an image to container registry
        inputs:
          command: buildAndPush
          repository: ${{ variables.repository }}
          dockerfile: ${{ variables.dockerfile }}
          containerRegistry: ${{ variables.containerRegistry }}
          tags: $(Build.BuildId)

  - stage: aks_deploy
    dependsOn: [Build]
    displayName: Deploy app to AKS
    jobs:  
    - job: Build
      displayName: Build job
      steps:
      - task: AzureCLI@2
        displayName: 'Configure AKS Cluster'
        inputs:
          azureSubscription: ${{ variables.backendServiceArm }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            #!/usr/bin/env bash
            set -euo pipefail

            RESOURCE_GROUP="devopsjourneyapr2026-rg"
            AKS_NAME="devopsjourneyapr2026"
            helm_resource_namespace="azure-alb-system"
            VNET_NAME="devopsjourneyapr2026-vnet"
            ALB_SUBNET_NAME="appgw"
            ALB_CONTROLLER_VERSION="1.10.21"
            ALB_RESOURCE_NAME='devopsjourneyapr2026-alb'
            ALB_FRONTEND_NAME='alb-frontend'
            APP_NAMESPACE='thomasthorntoncloud'

            # Get AKS Credentials
            az aks get-credentials -g $RESOURCE_GROUP -n $AKS_NAME --overwrite-existing
            kubelogin convert-kubeconfig -l azurecli

            #create namespace
            kubectl get namespace $helm_resource_namespace 2>/dev/null || kubectl create namespace $helm_resource_namespace

            #Create App Namespace
            kubectl get namespace $APP_NAMESPACE 2>/dev/null || kubectl create namespace $APP_NAMESPACE

            helm upgrade --install alb-controller oci://mcr.microsoft.com/application-lb/charts/alb-controller --namespace $helm_resource_namespace --version $ALB_CONTROLLER_VERSION --set albController.namespace=$helm_resource_namespace --set albController.podIdentity.clientID=$(az identity show -g $RESOURCE_GROUP -n azure-alb-identity --query clientId -o tsv)

            RESOURCE_ID=$(az network alb show --resource-group $RESOURCE_GROUP --name $ALB_RESOURCE_NAME --query id -o tsv)

            # Create a Gateway
            kubectl apply -f - <<EOF
            apiVersion: gateway.networking.k8s.io/v1
            kind: Gateway
            metadata:
              name: gateway-01
              namespace: thomasthorntoncloud
              annotations:
                alb.networking.azure.io/alb-id: $RESOURCE_ID
            spec:
              gatewayClassName: azure-alb-external
              listeners:
              - name: http
                port: 80
                protocol: HTTP
                allowedRoutes:
                  namespaces:
                    from: Same
              addresses:
              - type: alb.networking.azure.io/alb-frontend
                value: $ALB_FRONTEND_NAME
            EOF

            #Create HTTP Route
            kubectl apply -f - <<EOF
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: traffic-thomasthorntoncloud
              namespace: thomasthorntoncloud
            spec:
              parentRefs:
              - name: gateway-01
              rules:
              - backendRefs:
                - name: thomasthorntoncloud
                  port: 80
            EOF

            # Create secret for App Insights connection string
            # $(AIKEY) should be the full App Insights Connection String
            # (found in Azure Portal > Application Insights > Overview > Connection String)
            kubectl -n thomasthorntoncloud create secret generic aikey --from-literal=aisecret=$(AIKEY) --dry-run=client -o yaml | kubectl apply -f -

            # Apply app
            sed -i "s|IMAGE_TAG_PLACEHOLDER|${ACR_NAME}.azurecr.io/repository:$(Build.BuildId)|g" labs/5-CICD/pipelines/scripts/app.yaml
            kubectl apply -f labs/5-CICD/pipelines/scripts/app.yaml
            kubectl rollout status deployment/thomasthornton -n thomasthorntoncloud