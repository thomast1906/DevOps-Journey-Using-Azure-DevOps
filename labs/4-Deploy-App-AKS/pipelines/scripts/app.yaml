---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thomasthornton
  namespace: thomasthorntoncloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: thomasthorntoncloud
  template:
    metadata:
      labels:
        app: thomasthorntoncloud
    spec:
      containers:
      - name: thomasthorntoncloud
        image: IMAGE_TAG_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: aikey
              key: aisecret
              optional: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: thomasthorntoncloud
  namespace: thomasthorntoncloud
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: thomasthorntoncloud
